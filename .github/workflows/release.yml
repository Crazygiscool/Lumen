name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: |
          chmod +x scripts/*.sh
          ./scripts/build_linux.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumen-linux
          path: dist/*.tar.gz

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: |
          chmod +x scripts/*.sh
          ./scripts/build_macos.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumen-macos
          path: dist/*.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: |
          # No chmod needed for Windows but doesn't hurt if using Git Bash
          ./scripts/build_windows.sh
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: lumen-windows
          path: dist/*.zip

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            lumen-linux/*.tar.gz
            lumen-macos/*.zip
            lumen-windows/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
